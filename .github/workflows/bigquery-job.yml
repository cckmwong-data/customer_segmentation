name: Run Python Script with BigQuery

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-python:
    runs-on: ubuntu-latest

    env:
      RUN_GENAI: "false"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies safely
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Install Google Cloud SDK
      - name: Install gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate with Google Cloud
      - name: Authenticate with Google Cloud
        env:
          GCP_CREDS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GCP_CREDS" > $HOME/gcloud-key.json
          gcloud auth activate-service-account --key-file=$HOME/gcloud-key.json
          gcloud config set project new-project-456705
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      # Run Python script
      - name: Run Python Script
        run: python customer_segmentation_gh.py
